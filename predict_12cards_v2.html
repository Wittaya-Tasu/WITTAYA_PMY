<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบสรุปคำพยากรณ์ 12 ใบ - หมอวิทยา ธรรมนาย</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Kanit:wght@500;600&display=swap');

        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .no-print { margin-bottom: 20px; background: #ecf0f1; padding: 20px; border-radius: 15px; border: 1px solid #bdc3c7;}
        h2 { color: #2c3e50; font-family: 'Kanit', sans-serif; font-size: 2.2em; margin-bottom: 15px; margin-top: 0;}
        
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-label { font-weight: bold; color: #d35400; margin-bottom: 5px; display: block; font-size: 1.1em; }
        textarea { width: 95%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; resize: vertical; font-family: 'Sarabun', sans-serif;}
        #input-cards { height: 120px; }
        #input-prediction { height: 200px; }
        
        button { padding: 12px 25px; cursor: pointer; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-process { background: #2980b9; color: white; width: 100%; font-size: 18px; padding: 15px;}
        .btn-save-img { background: #27ae60; color: white; display: none; }
        .btn-save-pdf { background: #95a5a6; color: white; display: none; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        #capture-area { padding: 40px; background: white; border-radius: 15px; position: relative; }
        #result-display { margin-top: 10px; display: none; }
        
        /* ลายน้ำ */
        .section-container { position: relative; width: 100%; page-break-inside: avoid; } /* 🌟 ป้องกันการตัดแบ่งครึ่งกระดานไพ่ */
        .watermark-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; font-family: 'Kanit', sans-serif; font-size: 24px; font-weight: bold;
            color: rgba(255, 255, 255, 0.45); text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            letter-spacing: 1px; white-space: nowrap; pointer-events: none; z-index: 10; text-align: center;
        }

        .question-summary-box { font-size: 1.1em; color: #2c3e50; background: #fff3cd; padding: 25px; border-radius: 15px; margin-bottom: 30px; border-left: 10px solid #e67e22; text-align: left; line-height: 1.7; box-shadow: 0 4px 10px rgba(0,0,0,0.05); page-break-inside: avoid; } /* 🌟 ป้องกันการตัดแบ่งครึ่งกล่องสถานการณ์ */
        .q-title { font-size: 1.3em; font-weight: bold; color: #d35400; margin-bottom: 10px; display: block; border-bottom: 1px solid rgba(211, 84, 0, 0.2); padding-bottom: 5px;}
        .summary-content { white-space: pre-wrap; margin-top: 10px; font-weight: 400; color: #333; font-size: 1.05em; }

        /* 🌟 ระบบแสดงไพ่ 12 ใบ (ทรงพีระมิด) */
        .custom-layout-12 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px 20px; max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
        .pos-D1 { grid-area: 1 / 4; } .pos-C2 { grid-area: 2 / 3; } .pos-E2 { grid-area: 2 / 5; }
        .pos-B3 { grid-area: 3 / 2; } .pos-D3 { grid-area: 3 / 4; } .pos-F3 { grid-area: 3 / 6; }
        .pos-A4 { grid-area: 4 / 1; } .pos-B4 { grid-area: 4 / 2; } .pos-C4 { grid-area: 4 / 3; }
        .pos-E4 { grid-area: 4 / 5; } .pos-F4 { grid-area: 4 / 6; } .pos-G4 { grid-area: 4 / 7; }

        .card-item { background: #fff; border-radius: 10px; padding: 6px; border: 1px solid #eee; text-align: center; } 
        .card-item img { width: 100%; border-radius: 5px; display: block; }
        .pos-label { display: block; font-weight: bold; font-size: 0.85em; margin-bottom: 5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}

        /* สีปกติ */
        .card-very-good { background-color: #0047AB !important; border-color: #003380 !important; }
        .card-very-good .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }
        .card-good { background-color: #bbdefb !important; border-color: #90caf9 !important; }
        .card-good .pos-label { color: #0d47a1 !important; border-bottom-color: rgba(13,71,161,0.2) !important; }
        .card-neutral { background-color: #ffffff !important; border-color: #eeeeee !important; }
        .card-neutral .pos-label { color: #000000 !important; border-bottom-color: #e0e0e0 !important; }
        .card-bad { background-color: #212121 !important; border-color: #000000 !important; }
        .card-bad .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }
        .card-very-bad { background-color: #b71c1c !important; border-color: #7f0000 !important; }
        .card-very-bad .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }

        /* สีพิเศษ (ศัตรู/โรคภัย) */
        .alert-good { background-color: #616A6B !important; border-color: #4D5656 !important; }
        .alert-good .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }
        .alert-neutral { background-color: #17202A !important; border-color: #000000 !important; }
        .alert-neutral .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }
        .alert-bad { background-color: #C0392B !important; border-color: #922B21 !important; }
        .alert-bad .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }

        /* สีพิเศษ (Golden Zone) */
        .card-gold-zone { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) !important; border-color: #aa771c !important; box-shadow: 0 4px 15px rgba(170, 119, 28, 0.4); }
        .card-gold-zone .pos-label { color: #ffffff !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); border-bottom-color: rgba(255,255,255,0.4) !important; }

        /* ส่วนคำพยากรณ์รายใบ */
        .prediction-box { background: #fdfbf7; border: 2px solid #d4af37; border-radius: 15px; padding: 25px; margin-top: 35px; text-align: left; font-size: 1.1em; line-height: 1.7; color: #2c3e50; }
        .prediction-title { color: #8e44ad; font-family: 'Kanit', sans-serif; font-size: 1.5em; margin-bottom: 20px; border-bottom: 2px dashed #d4af37; padding-bottom: 10px; text-align: center; }

        /* 🌟 ป้องกันการตัดแบ่งครึ่งคำทำนายแต่ละข้อ */
        .prediction-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 15px; padding: 15px; border-bottom: 1px solid #f0f0f0; border-radius: 10px; background: white; page-break-inside: avoid; }
        .prediction-item:last-child { border-bottom: none; }
        
        .small-card-container { width: 70px; padding: 5px; border-radius: 8px; border: 1px solid #ddd; flex-shrink: 0; text-align: center; }
        .small-card-container img { width: 100%; border-radius: 4px; display: block; }
        .prediction-content { flex: 1; white-space: pre-wrap; align-self: center; }
        .prediction-content b { color: #d35400; }

        /* กล่องไฮไลท์ 🎯 และ ⚠️ */
        .highlights-wrapper { display: flex; flex-direction: column; gap: 20px; margin-top: 25px; }
        /* 🌟 ป้องกันการตัดแบ่งครึ่งกล่องไฮไลท์ */
        .highlight-box { width: 100%; box-sizing: border-box; padding: 20px; border-radius: 12px; text-align: left; font-size: 1.05em; line-height: 1.6; page-break-inside: avoid; }
        .box-pros { background: #f0fdf4; border: 2px solid #22c55e; }
        .box-pros .h-title { color: #15803d; font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #bbf7d0; padding-bottom: 8px; margin-bottom: 10px;}
        .box-cons { background: #fef2f2; border: 2px solid #ef4444; }
        .box-cons .h-title { color: #b91c1c; font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #fecaca; padding-bottom: 8px; margin-bottom: 10px;}
        .h-list { white-space: pre-wrap; color: #333; margin: 0; }

        .footer-credit { font-size: 14px; color: #bdc3c7; margin-top: 30px; text-align: center; font-weight: bold; page-break-inside: avoid; }

        @media print {
            .no-print, .btn-group { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; }
            .custom-layout-12 { display: grid !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>🔮 ระบบพยากรณ์ 12 ใบ (หมอวิทยา)</h2>
        <div class="input-group">
            <label class="input-label">1. รายการไพ่ 12 ใบ (ก๊อปปี้จาก Input ที่มีรหัสไพ่มาวาง)</label>
            <textarea id="input-cards" placeholder="ตัวอย่าง:&#10;1. พื้นดวง: 407 ท้าววิรุฬหก&#10;2. ทรัพย์สิน: 410 ท้าวเวสสุวรรณ..."></textarea>
        </div>
        <div class="input-group">
            <label class="input-label">2. คำพยากรณ์จาก AI (ก๊อปปี้มาทั้งหมด)</label>
            <textarea id="input-prediction" placeholder="วางข้อความที่ AI ตอบมาทั้งหมดที่นี่..."></textarea>
        </div>
        <button class="btn-process" onclick="processReading()">✨ สร้างใบสรุปคำพยากรณ์</button>
    </div>

    <div class="btn-group no-print">
        <button id="btnSaveImg" class="btn-save-img" onclick="saveAsA4PDF()">📑 บันทึกเป็น PDF (ขนาดไฟล์เล็ก + ไม่ตัดกลางคำ)</button>
        <button id="btnSavePdf" class="btn-save-pdf" onclick="window.print()">🖨️ สั่งพิมพ์ (Print)</button>
    </div>

    <div id="capture-area">
        <div id="result-display">
            <div id="q-summary-area" class="question-summary-box">
                <span class="q-title" id="display-q"></span>
                <div class="summary-content" id="display-summary"></div>
            </div>
            
            <div class="section-container" style="margin-bottom: 30px;">
                <div id="card-area" class="custom-layout-12"></div>
                <div class="watermark-overlay">© พรหมญาณพยากรณ์ : หมอวิทยา ธรรมนาย</div>
            </div>

            <div id="prediction-area" class="prediction-box">
                <div class="prediction-title">✨ รายละเอียดคำทำนาย 12 ตำแหน่ง ✨</div>
                <div id="prediction-list"></div>
                
                <div class="highlights-wrapper" id="highlights-area" style="display:none;">
                    <div class="highlight-box box-pros" id="box-pros-content"></div>
                    <div class="highlight-box box-cons" id="box-cons-content"></div>
                </div>
            </div>

            <div class="footer-credit">พรหมญาณพยากรณ์ โดย หมอวิทยา ธรรมนาย (ศิษย์รุ่น 75)</div>
        </div>
    </div>
</div>

<script>
    const IMAGE_PATH = 'images/'; 
    const IMAGE_EXT = '.jpg'; 
    const gridLayoutMap12 = ["pos-D1", "pos-C2", "pos-E2", "pos-B3", "pos-F3", "pos-A4", "pos-G4", "pos-F4", "pos-E4", "pos-C4", "pos-B4", "pos-D3"];
    
    const VERY_GOOD = ["101", "409", "411", "424"];
    const GOOD = ["104", "105", "106", "201", "202", "203", "204", "206", "207", "301", "304", "307", "312", "402", "404", "405", "406", "410", "414", "415", "416", "417", "418", "419", "421", "422", "426", "429"];
    const NEUTRAL = ["102", "209", "210", "211", "303", "305", "309", "311", "403", "407", "420", "435", "436"];
    const BAD = ["103", "107", "205", "208", "212", "302", "306", "308", "310", "413", "423", "425", "427", "428", "430", "432", "433", "434"];
    const VERY_BAD = ["401", "408", "412", "431"];

    const ALERT_POSITIONS = ["ศัตรู", "โรคภัย"];
    const WEALTH_CARDS = ["410", "411", "415", "416", "424", "429"];
    const WEALTH_POSITIONS = ["ทรัพย์สิน", "บ้านช่อง", "ลาภยศ", "ความสุข", "พื้นดวง", "สรุปดวงชะตา", "สรุป"];

    function getAdvancedStatusClass(cardId, posName) {
        if (ALERT_POSITIONS.includes(posName)) {
            if (VERY_GOOD.includes(cardId) || GOOD.includes(cardId)) return "alert-good";
            if (NEUTRAL.includes(cardId)) return "alert-neutral";
            return "alert-bad";
        }
        if (WEALTH_POSITIONS.includes(posName) && WEALTH_CARDS.includes(cardId)) {
            return "card-gold-zone";
        }
        if (VERY_BAD.includes(cardId)) return "card-very-bad";
        if (BAD.includes(cardId)) return "card-bad";
        if (VERY_GOOD.includes(cardId)) return "card-very-good";
        if (GOOD.includes(cardId)) return "card-good";
        return "card-neutral";
    }

    function processReading() {
        let inputCards = document.getElementById('input-cards').value;
        let inputPred = document.getElementById('input-prediction').value;
        const resDisp = document.getElementById('result-display');
        
        if (!inputCards.trim() || !inputPred.trim()) { alert("กรุณาใส่ข้อมูลให้ครบทั้ง 2 ช่องครับ"); return; }

        inputPred = inputPred.replace(/\[cite_start\]/gi, "");
        inputPred = inputPred.replace(/\[cite[^\]]*\]/gi, ""); 
        inputPred = inputPred.replace(/\[\d+(?:,\s*\d+)*\]/g, ""); 
        inputPred = inputPred.replace(/\*/g, ""); 
        
        document.getElementById('card-area').innerHTML = "";
        document.getElementById('prediction-list').innerHTML = "";
        document.getElementById('highlights-area').style.display = "none";
        resDisp.style.display = 'block';

        const lines = inputCards.split('\n');
        let question = "วิเคราะห์พื้นดวงชะตา (12 ใบ)";
        const cardData = [];
        
        lines.forEach(l => {
            if (l.includes('❓ คำถาม:')) question = l.replace('❓ คำถาม:', '').trim();
            if (/^\d+\./.test(l) && l.includes(':')) {
                const parts = l.split(':');
                const posName = parts[0].replace(/^\d+\.\s*/, '').trim();
                const cardId = parts[1].trim().substring(0, 3); 
                cardData.push({ position: posName, id: cardId });
            }
        });

        const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const d = new Date();
        const m = d.getMonth(); 
        const m1 = thaiMonths[(m + 1) % 12];
        const m2 = thaiMonths[(m + 2) % 12];
        const m3 = thaiMonths[(m + 3) % 12];
        document.getElementById('display-q').innerHTML = `🌟 ไพ่พรหมญาณ 12 ใบ : ทิศทางดวงชะตา <span style="color: #666;">(${m1} - ${m2} - ${m3})</span>`;

        let introMatch = inputPred.split(/1\.\s/);
        let introText = introMatch.length > 0 ? introMatch[0].trim() : "";
        document.getElementById('display-summary').innerHTML = introText;

        let prosText = ""; let consText = "";
        const prosRegex = /🎯\s*จุดเด่นของดวงชะตา.*?\n([\s\S]*?)(?=⚠️)/;
        let pMatch = inputPred.match(prosRegex);
        if(pMatch) prosText = pMatch[1].trim();

        const consRegex = /⚠️\s*เรื่องที่ไม่ควรประมาท.*?\n([\s\S]*)$/;
        let cMatch = inputPred.match(consRegex);
        if(cMatch) consText = cMatch[1].trim();

        if(prosText || consText) {
            document.getElementById('highlights-area').style.display = "flex";
            document.getElementById('box-pros-content').innerHTML = `<div class="h-title">🎯 จุดเด่นของดวงชะตา</div><div class="h-list">${prosText}</div>`;
            document.getElementById('box-cons-content').innerHTML = `<div class="h-title">⚠️ เรื่องที่ไม่ควรประมาท</div><div class="h-list">${consText}</div>`;
        }

        let mainPredictions = [];
        for (let i = 1; i <= 12; i++) {
            let nextMark = i < 12 ? `(?=\\n?${i+1}\\.\\s)` : `(?=\\n?🎯)`;
            let regex = new RegExp(`(${i}\\.\\s[\\s\\S]*?)${nextMark}`);
            let match = inputPred.match(regex);
            if (match) {
                let formattedText = match[1].trim().replace(/^(\d+\.\s[\s\S]*?บ่งบอกถึง:)/, '<b>$1</b>');
                mainPredictions.push(formattedText);
            }
        }

        cardData.forEach((card, idx) => {
            const sClass = getAdvancedStatusClass(card.id, card.position);
            
            const divCard = document.createElement('div');
            const layoutPos = gridLayoutMap12[idx] || ""; 
            divCard.className = `card-item ${sClass} ${layoutPos}`;
            divCard.innerHTML = `<span class="pos-label">${card.position}</span><img src="${IMAGE_PATH}${card.id}${IMAGE_EXT}" crossorigin="anonymous">`;
            document.getElementById('card-area').appendChild(divCard);

            if(mainPredictions[idx]) {
                const divPred = document.createElement('div');
                divPred.className = 'prediction-item';
                divPred.innerHTML = `
                    <div class="small-card-container ${sClass}">
                        <img src="${IMAGE_PATH}${card.id}${IMAGE_EXT}" crossorigin="anonymous">
                    </div>
                    <div class="prediction-content">${mainPredictions[idx]}</div>
                `;
                document.getElementById('prediction-list').appendChild(divPred);
            }
        });

        document.getElementById('btnSaveImg').style.display = 'inline-block';
        document.getElementById('btnSavePdf').style.display = 'inline-block';
        resDisp.scrollIntoView({ behavior: 'smooth' });
    }

    // 🌟 ระบบสร้าง PDF ฉบับปรับปรุง (ตัดหน้าฉลาดขึ้น + ไฟล์เล็กกะทัดรัด) 🌟
    function saveAsA4PDF() {
        const btn = document.getElementById('btnSaveImg');
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ กำลังประมวลผล PDF...";
        btn.disabled = true;

        const element = document.getElementById('capture-area');
        
        // การตั้งค่า html2pdf
        const opt = {
            margin:       10, // ขอบกระดาษ 10mm
            filename:     'ใบพยากรณ์12ใบ-หมอวิทยา.pdf',
            image:        { type: 'jpeg', quality: 0.85 }, // บีบอัดเป็น JPEG (ลดขนาดไฟล์จาก 80MB เหลือราวๆ 1-3MB)
            html2canvas:  { scale: 1.5, useCORS: true }, // ลด scale ช่วยลดขนาดไฟล์แต่ยังคมชัด
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:    { mode: ['css', 'avoid-all'] } // สั่งให้ระบบเคารพ CSS page-break-inside: avoid; ไม่ตัดกลางกล่อง
        };

        // เริ่มสร้าง PDF
        html2pdf().set(opt).from(element).save().then(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
