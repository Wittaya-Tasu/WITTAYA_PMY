<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แสดงผลรูปภาพไพ่ - หมอวิทยา ธรรมนาย</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Kanit:wght@600&display=swap');

        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1200px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .no-print { margin-bottom: 20px; }
        h2 { color: #2c3e50; font-family: 'Kanit', sans-serif; font-size: 2.2em; margin-bottom: 5px; }
        textarea { width: 95%; height: 80px; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; margin-bottom: 15px; resize: none; }
        
        .btn-group { margin-bottom: 20px; }
        button { padding: 12px 25px; cursor: pointer; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-process { background: #2980b9; color: white; }
        .btn-save-img { background: #27ae60; color: white; display: none; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        #capture-area { padding: 30px; background: white; border-radius: 15px; }
        #result-display { margin-top: 20px; display: none; }
        .question-box { font-size: 1.4em; font-weight: bold; color: #2c3e50; background: #fff3cd; padding: 20px; border-radius: 10px; margin-bottom: 30px; border-left: 8px solid #e67e22; text-align: left; }

        .card-item { background: #fff; border-radius: 10px; padding: 8px; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .card-item img { width: 100%; border-radius: 5px; display: block; }
        
        .pos-label { 
            display: block; font-weight: bold; color: #27ae60; 
            font-size: 0.85em; margin-bottom: 8px; 
            border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; 
        }

        /* 🟢 สไตล์เงื่อนไข */
        .pos-black { color: #000000 !important; }
        .pos-red { color: #ff0000 !important; }

        /* 🔴 วิกฤต (Crisis Zone) */
        .card-danger-zone { background-color: #ff0000 !important; border-color: #b30000 !important; }
        .card-danger-zone .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }

        /* 🟡 มั่งคั่ง (Golden Zone) */
        .card-gold-zone { 
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) !important; 
            border-color: #aa771c !important; 
            box-shadow: 0 4px 15px rgba(170, 119, 28, 0.4);
        }
        .card-gold-zone .pos-label { color: #ffffff !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); border-bottom-color: rgba(255,255,255,0.4) !important; }

        /* Layout */
        .custom-layout-3to6 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0 25px; max-width: 850px; margin: 0 auto; }
        .custom-layout-12 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0 25px; }

        .pos-D1 { grid-area: 1 / 4; } .pos-C2 { grid-area: 2 / 3; } .pos-E2 { grid-area: 2 / 5; }
        .pos-B3 { grid-area: 3 / 2; } .pos-D3 { grid-area: 3 / 4; } .pos-F3 { grid-area: 3 / 6; }
        .pos-A4 { grid-area: 4 / 1; } .pos-B4 { grid-area: 4 / 2; } .pos-C4 { grid-area: 4 / 3; }
        .pos-E4 { grid-area: 4 / 5; } .pos-F4 { grid-area: 4 / 6; } .pos-G4 { grid-area: 4 / 7; }

        @media print {
            .no-print, .btn-group, textarea { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; }
            .custom-layout-12, .custom-layout-3to6 { display: grid !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>🔮 ระบบแสดงผลรูปภาพ - หมอวิทยา ธรรมนาย</h2>
        <textarea id="input-text" placeholder="วางผลลัพธ์ที่คัดลอกมาที่นี่..."></textarea>
    </div>

    <div class="btn-group no-print">
        <button class="btn-process" onclick="processCards()">🖼️ แสดงรูปภาพไพ่</button>
        <button id="btnSaveImg" class="btn-save-img" onclick="saveAsImage()">💾 บันทึกเป็นรูปภาพ</button>
        <button class="btn-save-img" style="background:#95a5a6; display:inline-block;" onclick="window.print()">📑 บันทึกเป็น PDF</button>
    </div>

    <div id="capture-area">
        <div id="result-display">
            <div id="display-question" class="question-box"></div>
            <div id="card-area"></div>
            <p style="font-size: 12px; color: #bdc3c7; margin-top: 20px; text-align: center;">พยากรณ์โดย หมอวิทยา ธรรมนาย</p>
        </div>
    </div>
</div>

<script>
    const IMAGE_PATH = 'images/'; 
    const IMAGE_EXT = '.jpg'; 
    const gridLayoutMap12 = ["pos-D1", "pos-C2", "pos-E2", "pos-B3", "pos-F3", "pos-A4", "pos-G4", "pos-F4", "pos-E4", "pos-C4", "pos-B4", "pos-D3"];
    
    const BAD_CARD_IDS = ["401", "412", "408", "430", "431", "433"];
    const GOOD_CARD_IDS = ["410", "411", "415", "416", "424"];
    const ALERT_POSITIONS = ["ศัตรู/อุปสรรค", "โรค/ภัยพิบัติ"];
    const WEALTH_POSITIONS = ["ทรัพย์สิน", "บ้านช่อง/สมบัติ", "ความสุขสมหวัง", "โชค/ยศศักดิ์"];

    function processCards() {
        const inputText = document.getElementById('input-text').value;
        const resultDisplay = document.getElementById('result-display');
        const displayQuestion = document.getElementById('display-question');
        const cardArea = document.getElementById('card-area');
        const btnSave = document.getElementById('btnSaveImg');

        if (!inputText.trim()) { alert("กรุณาวางข้อความก่อนครับ"); return; }

        cardArea.innerHTML = ""; 
        resultDisplay.style.display = 'block';
        btnSave.style.display = 'inline-block';

        const lines = inputText.split('\n');
        let question = "ดูดวงภาพรวม";
        const cardLines = [];

        lines.forEach(line => {
            if (line.includes('❓ คำถาม:')) question = line.replace('❓ คำถาม:', '').trim();
            if (/^\d+\./.test(line) && line.includes(':')) cardLines.push(line);
        });

        displayQuestion.innerHTML = `❓ <b>คำถาม:</b> ${question}`;
        const totalCards = cardLines.length;

        if (totalCards === 12) cardArea.className = 'custom-layout-12';
        else if (totalCards >= 3) cardArea.className = 'custom-layout-3to6';

        cardLines.forEach((line, index) => {
            const parts = line.split(':');
            const posPart = parts[0].replace(/^\d+\.\s*/, '').trim(); 
            const cardPart = parts[1].trim(); 
            const cardId = cardPart.substring(0, 3); 

            let cardClass = "card-item";
            let labelClass = "pos-label";

            const isBadCard = BAD_CARD_IDS.includes(cardId);
            const isGoodCard = GOOD_CARD_IDS.includes(cardId);
            const isAlertPos = ALERT_POSITIONS.includes(posPart);
            const isWealthPos = WEALTH_POSITIONS.includes(posPart);

            if (isAlertPos && isBadCard) cardClass += " card-danger-zone";
            else if (isWealthPos && isGoodCard) cardClass += " card-gold-zone";
            else if (isBadCard) labelClass += " pos-red";
            else if (isAlertPos) labelClass += " pos-black";

            const cardDiv = document.createElement('div');
            cardDiv.className = cardClass;
            if (totalCards === 12) cardDiv.classList.add(gridLayoutMap12[index]);

            cardDiv.innerHTML = `<span class="${labelClass}">${posPart}</span><img src="${IMAGE_PATH}${cardId}${IMAGE_EXT}" crossorigin="anonymous">`;
            cardArea.appendChild(cardDiv);
        });
        resultDisplay.scrollIntoView({ behavior: 'smooth' });
    }

    function saveAsImage() {
        const captureArea = document.getElementById('capture-area');
        window.scrollTo(0,0);
        html2canvas(captureArea, { useCORS: true, scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'ผลการทำนาย-หมอวิทยา.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
