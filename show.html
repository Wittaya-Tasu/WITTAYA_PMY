<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แสดงผลรูปภาพไพ่ - หมอวิทยา ธรรมนาย</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Kanit:wght@600&display=swap');

        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1200px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h2 { color: #2c3e50; font-family: 'Kanit', sans-serif; font-size: 2.2em; margin-bottom: 5px; }
        .description { color: #7f8c8d; margin-bottom: 25px; }

        textarea { width: 95%; height: 100px; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; margin-bottom: 15px; resize: none; font-family: inherit; }
        textarea:focus { border-color: #2980b9; outline: none; }
        
        button { padding: 15px 35px; cursor: pointer; background: #2980b9; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 0 #1c5a85; }
        button:hover { background: #1f6391; transform: translateY(-2px); }
        button:active { transform: translateY(2px); box-shadow: none; }

        #result-display { margin-top: 40px; display: none; border-top: 2px solid #eee; padding-top: 30px; }
        .question-box { font-size: 1.4em; font-weight: bold; color: #2c3e50; background: #fff3cd; padding: 20px; border-radius: 10px; margin-bottom: 30px; border-left: 8px solid #e67e22; text-align: left; }

        /* ============================================================
           CSS สำหรับไอเทมไพ่ (ปรับให้ไม่มีส่วนชื่อรหัสด้านล่าง)
           ============================================================ */
        .card-item { 
            background: #fff; 
            border-radius: 12px; 
            padding: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            border: 1px solid #eee; 
            transition: 0.3s; 
        }
        .card-item:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.12); z-index: 10; }
        
        .card-item img { 
            width: 100%; 
            border-radius: 6px; 
            display: block; /* ลบช่องว่างใต้ภาพ */
            background: #eee;
        }

        .pos-label { 
            display: block; 
            font-weight: bold; 
            color: #27ae60; 
            font-size: 0.85em; 
            margin-bottom: 8px; 
            border-bottom: 1px solid #f0f0f0; 
            padding-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ============================================================
           LAYOUT: 3-6 ใบ (ถามตอบ) 
           ============================================================ */
        .custom-layout-3to6 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0 25px; /* แถวห่าง 0, คอลัมน์ห่าง 25px */
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 850px;
        }

        /* ============================================================
           LAYOUT: 12 ใบ (พื้นดวง) 
           ============================================================ */
        .custom-layout-12 {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(4, auto);
            gap: 0 25px; /* แถวห่าง 0, คอลัมน์ห่าง 25px */
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 15px;
            margin-top: 20px;
        }

        /* กำหนดตำแหน่ง Grid สำหรับผัง 12 ใบ */
        .pos-D1 { grid-area: 1 / 4; }
        .pos-C2 { grid-area: 2 / 3; }
        .pos-E2 { grid-area: 2 / 5; }
        .pos-B3 { grid-area: 3 / 2; }
        .pos-D3 { grid-area: 3 / 4; }
        .pos-F3 { grid-area: 3 / 6; }
        .pos-A4 { grid-area: 4 / 1; }
        .pos-B4 { grid-area: 4 / 2; }
        .pos-C4 { grid-area: 4 / 3; }
        .pos-E4 { grid-area: 4 / 5; }
        .pos-F4 { grid-area: 4 / 6; }
        .pos-G4 { grid-area: 4 / 7; }

        @media (max-width: 1024px) {
            .custom-layout-12 { grid-template-columns: repeat(4, 1fr); gap: 10px 15px; }
            .pos-D1, .pos-C2, .pos-E2, .pos-B3, .pos-D3, .pos-F3, .pos-A4, .pos-B4, .pos-C4, .pos-E4, .pos-F4, .pos-G4 { grid-area: auto; }
        }
        
        @media (max-width: 600px) {
            .custom-layout-12, .custom-layout-3to6 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔮 ระบบแสดงผลรูปภาพ - หมอวิทยา ธรรมนาย</h2>
    <p class="description">วางข้อความผลลัพธ์เพื่อแสดงผังรูปภาพไพ่</p>
    
    <textarea id="input-text" placeholder="วางผลลัพธ์ที่คัดลอกมาที่นี่..."></textarea><br>
    <button onclick="processCards()">🖼️ แสดงรูปภาพไพ่</button>
