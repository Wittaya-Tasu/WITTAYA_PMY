<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปคำพยากรณ์ : หมอวิทยา ธรรมนาย</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Kanit:wght@500;600&display=swap');

        body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .no-print { margin-bottom: 20px; background: #ecf0f1; padding: 20px; border-radius: 15px; border: 1px solid #bdc3c7;}
        h2 { color: #2c3e50; font-family: 'Kanit', sans-serif; font-size: 2.2em; margin-bottom: 15px; margin-top: 0;}
        
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-label { font-weight: bold; color: #d35400; margin-bottom: 5px; display: block; font-size: 1.1em; }
        textarea { width: 95%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; resize: vertical; font-family: 'Sarabun', sans-serif;}
        
        button { padding: 12px 25px; cursor: pointer; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-process { background: #2980b9; color: white; width: 100%; font-size: 18px; padding: 15px;}
        .btn-save-img { background: #27ae60; color: white; display: none; }
        .btn-save-pdf { background: #95a5a6; color: white; display: none; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        #capture-area { padding: 40px; background: white; border-radius: 15px; position: relative; }
        #result-display { margin-top: 10px; display: none; }
        
        .copyright-header { font-size: 14px; color: #95a5a6; margin-bottom: 15px; font-weight: bold; }

        .watermark-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            font-family: 'Kanit', sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: rgba(0, 0, 0, 0.15); /* ความเข้มลายน้ำ 15% */
            white-space: nowrap;
            pointer-events: none;
            z-index: 10;
            text-align: center;
        }

        .section-container { position: relative; width: 100%; }

        .master-cards-layout { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; padding-bottom: 25px; border-bottom: 2px dashed #bdc3c7; position: relative; z-index: 1; }
        .master-card { flex: 1; max-width: 80px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 2px solid #d4af37; background: #fff; }
        .master-card img { width: 100%; display: block; }

        .question-summary-box { font-size: 1.1em; color: #2c3e50; background: #fff3cd; padding: 25px; border-radius: 15px; margin-bottom: 30px; border-left: 10px solid #e67e22; text-align: left; line-height: 1.7; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .q-title { font-size: 1.3em; font-weight: bold; color: #d35400; margin-bottom: 10px; display: block; border-bottom: 1px solid rgba(211, 84, 0, 0.2); padding-bottom: 5px;}
        
        .summary-content { white-space: pre-wrap; margin-top: 10px; font-weight: 400; color: #333; font-size: 1.05em; }

        .custom-layout-3to6 { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; max-width: 800px; margin: 20px auto; position: relative; z-index: 1; }
        .card-item { background: #fff; border-radius: 8px; padding: 6px; border: 1px solid #eee; text-align: center; width: calc(16.66% - 15px); max-width: 90px;} 
        .card-item img { width: 100%; border-radius: 4px; display: block; }
        .pos-label { display: block; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}

        .card-very-good { background-color: #0047AB !important; border-color: #003380 !important; }
        .card-very-good .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }
        .card-good { background-color: #bbdefb !important; border-color: #90caf9 !important; }
        .card-good .pos-label { color: #0d47a1 !important; border-bottom-color: rgba(13,71,161,0.2) !important; }
        .card-neutral { background-color: #ffffff !important; border-color: #eeeeee !important; }
        .card-neutral .pos-label { color: #000000 !important; border-bottom-color: #e0e0e0 !important; }
        .card-bad { background-color: #212121 !important; border-color: #000000 !important; }
        .card-bad .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }
        .card-very-bad { background-color: #b71c1c !important; border-color: #7f0000 !important; }
        .card-very-bad .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }

        .prediction-box { background: #fdfbf7; border: 2px solid #d4af37; border-radius: 15px; padding: 25px; margin-top: 35px; text-align: left; font-size: 1.1em; line-height: 1.7; color: #2c3e50; }
        .prediction-title { color: #8e44ad; font-family: 'Kanit', sans-serif; font-size: 1.5em; margin-bottom: 20px; border-bottom: 2px dashed #d4af37; padding-bottom: 10px; text-align: center; }

        .prediction-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 15px; padding: 15px; border-bottom: 1px solid #f0f0f0; border-radius: 10px; background: white; }
        .prediction-item:last-child { border-bottom: none; }
        
        .small-card-container { width: 60px; padding: 5px; border-radius: 8px; border: 1px solid #ddd; flex-shrink: 0; text-align: center; }
        .small-card-container img { width: 100%; border-radius: 4px; display: block; }
        
        .prediction-content { flex: 1; white-space: pre-wrap; align-self: center; }
        .extra-section { margin-top: 25px; padding: 20px; border-top: 2px dashed #bdc3c7; background: #f9f9f9; border-radius: 10px; white-space: pre-wrap; text-align: left; line-height: 1.8; }
        .extra-title { font-weight: bold; color: #2980b9; margin-bottom: 10px; display: block; font-size: 1.2em; border-bottom: 1px solid #ddd; padding-bottom: 5px; }

        .footer-credit { font-size: 14px; color: #bdc3c7; margin-top: 30px; text-align: center; font-weight: bold;}

        @media print {
            .no-print, .btn-group { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>📜 ใบสรุปคำพยากรณ์</h2>
        <div class="input-group">
            <label class="input-label">1.คำถาม และ ชื่อไพ่.</label>
            <textarea id="input-cards" placeholder="วางผลการเลือกไพ่ที่นี่..."></textarea>
        </div>
        <div class="input-group">
            <label class="input-label">2.คำพยากรณ์.</label>
            <textarea id="input-prediction" placeholder="วางคำทำนายที่นี่..."></textarea>
        </div>
        <button class="btn-process" onclick="processReading()">✨ สร้างใบสรุปคำพยากรณ์</button>
    </div>

    <div class="btn-group no-print">
        <button id="btnSaveImg" class="btn-save-img" onclick="saveAsImage()">💾 SAVE IMAGE</button>
        <button id="btnSavePdf" class="btn-save-pdf" onclick="window.print()">📑 SAVE PDF</button>
    </div>

    <div id="capture-area">
        <div id="result-display">
            <div class="copyright-header">
                ระบบแสดงคำทำนายนี้ ใช้เฉพาะกับการพยากรณ์ของ "หมอวิทยา ธรรมนาย" ไม่อนุญาตให้เผยแพร่
            </div>

            <div class="section-container">
                <div id="master-cards-area" class="master-cards-layout"></div>
                <div class="watermark-overlay">พรหมญาณพยากรณ์ : หมอวิทยา ธรรมนาย(ศิษย์รุ่น 75)</div>
            </div>
            
            <div id="q-summary-area" class="question-summary-box">
                <span class="q-title" id="display-q"></span>
                <div class="summary-content" id="display-summary"></div>
            </div>
            
            <div class="section-container">
                <div id="card-area" class="custom-layout-3to6"></div>
                <div class="watermark-overlay">พรหมญาณพยากรณ์ : หมอวิทยา ธรรมนาย(ศิษย์รุ่น 75)</div>
            </div>

            <div id="prediction-area" class="prediction-box">
                <div class="prediction-title">✨ รายละเอียดคำทำนายของไพ่แต่ละใบ ✨</div>
                <div id="prediction-list"></div>
                <div id="extra-list" class="extra-section" style="display:none;"></div>
            </div>

            <div class="footer-credit">พรหมญาณพยากรณ์ โดย หมอวิทยา ธรรมนาย</div>
        </div>
    </div>
</div>

<script>
    const IMAGE_PATH = 'images/'; 
    const IMAGE_EXT = '.jpg'; 
    const VERY_GOOD = ["101", "409", "411", "424"];
    const GOOD = ["104", "105", "106", "201", "202", "203", "204", "206", "207", "301", "304", "307", "312", "402", "404", "405", "406", "410", "414", "415", "416", "417", "418", "419", "421", "422", "426", "429"];
    const NEUTRAL = ["102", "209", "210", "211", "303", "305", "309", "311", "403", "407", "420", "435", "436"];
    const BAD = ["103", "107", "205", "208", "212", "302", "306", "308", "310", "413", "423", "425", "427", "428", "430", "432", "433", "434"];
    const VERY_BAD = ["401", "408", "412", "431"];

    function getStatusClass(id) {
        if (VERY_BAD.includes(id)) return "card-very-bad";
        if (BAD.includes(id)) return "card-bad";
        if (VERY_GOOD.includes(id)) return "card-very-good";
        if (GOOD.includes(id)) return "card-good";
        return "card-neutral";
    }

    function processReading() {
        let inputCards = document.getElementById('input-cards').value;
        let inputPred = document.getElementById('input-prediction').value;
        const resDisp = document.getElementById('result-display');
        
        if (!inputCards.trim() || !inputPred.trim()) { alert("กรุณาใส่ข้อมูลให้ครบครับ"); return; }

        // ลบข้อความขยะ
        inputPred = inputPred.replace(/\[cite_start\]/gi, "");
        inputPred = inputPred.replace(/\]*\]/gi, "");
        inputPred = inputPred.replace(/\[\^?\d+\^?\]/g, ""); 
        inputPred = inputPred.replace(/\(\d+\)/g, "");     
        inputPred = inputPred.replace(/\[source\]/gi, ""); 

        document.getElementById('card-area').innerHTML = "";
        document.getElementById('master-cards-area').innerHTML = "";
        document.getElementById('prediction-list').innerHTML = "";
        document.getElementById('extra-list').innerHTML = "";
        document.getElementById('extra-list').style.display = "none";
        resDisp.style.display = 'block';

        for (let i = 501; i <= 506; i++) {
            document.getElementById('master-cards-area').innerHTML += `<div class="master-card"><img src="${IMAGE_PATH}${i}${IMAGE_EXT}" crossorigin="anonymous"></div>`;
        }

        const lines = inputCards.split('\n');
        let question = "ดูดวงภาพรวม";
        const cardLines = [];
        lines.forEach(l => {
            if (l.includes('❓ คำถาม:')) question = l.replace('❓ คำถาม:', '').trim();
            if (/^\d+\./.test(l) && l.includes(':')) cardLines.push(l);
        });
        document.getElementById('display-q').innerHTML = `❓ คำถาม: ${question}`;

        let summaryText = "";
        let extraText = "";
        
        // แยกความหมายพิเศษ
        const extraRegex = /(?:ความหมายพิเศษ:|ความหมายเพิ่มเติม:)\s*([\s\S]*)$/;
        let extraMatch = inputPred.match(extraRegex);
        if (extraMatch) {
            extraText = extraMatch[1].trim();
            inputPred = inputPred.replace(extraRegex, ''); 
        }

        // แยกสรุปคำพยากรณ์
        const summaryRegex = /สรุปคำพยากรณ์:\s*([\s\S]*)$/;
        let summaryMatch = inputPred.match(summaryRegex);
        if (summaryMatch) {
            summaryText = summaryMatch[1].trim();
            inputPred = inputPred.replace(summaryRegex, '');
        }

        // ข้อความที่เหลือคือคำทำนายรายใบ
        let chunks = inputPred.split(/(?:ภาพรวมหลัก:|ความรู้สึก\/ปัจจัยที่ส่งผล:|บทสรุปและคำแนะนำ:|ขยายความเพิ่มเติม:)/g);
        let mainPredictions = chunks.filter(c => c.trim().length > 0).map(c => c.trim());
        
        if (mainPredictions.length < cardLines.length) {
            let fallback = inputPred.split(/\n\s*\n/).filter(c => c.trim().length > 0);
            if (fallback.length >= cardLines.length) mainPredictions = fallback;
            else {
                let fallback2 = inputPred.split('\n').filter(c => c.trim().length > 0);
                if (fallback2.length >= cardLines.length) mainPredictions = fallback2;
            }
        }

        if (summaryText) {
            document.getElementById('display-summary').innerHTML = `<b style="color:#000; font-size:1.15em;">คำตอบ:</b> ${summaryText}`;
        } else {
            document.getElementById('display-summary').innerHTML = "";
        }

        cardLines.forEach((line) => {
            const parts = line.split(':');
            const posPart = parts[0].replace(/^\d+\.\s*/, '').trim(); 
            const cardId = parts[1].trim().substring(0, 3); 
            const sClass = getStatusClass(cardId);
            const div = document.createElement('div');
            div.className = `card-item ${sClass}`;
            div.innerHTML = `<span class="pos-label">${posPart}</span><img src="${IMAGE_PATH}${cardId}${IMAGE_EXT}" crossorigin="anonymous">`;
            document.getElementById('card-area').appendChild(div);
        });

        mainPredictions.forEach((text, idx) => {
            if (idx < cardLines.length) {
                const cardId = cardLines[idx].split(':')[1].trim().substring(0, 3);
                const sClass = getStatusClass(cardId);
                const div = document.createElement('div');
                div.className = 'prediction-item';
                div.innerHTML = `
                    <div class="small-card-container ${sClass}">
                        <img src="${IMAGE_PATH}${cardId}${IMAGE_EXT}" crossorigin="anonymous">
                    </div>
                    <div class="prediction-content">${text}</div>
                `;
                document.getElementById('prediction-list').appendChild(div);
            }
        });

        // 🌟 แก้ไขโค้ดส่วนนี้ที่ทำระบบพังในเวอร์ชันก่อนครับ
       if (extraText) {
            let cleanExtra = extraText.replace('ความหมายพิเศษ:', '').replace('ความหมายเพิ่มเติม:', '').trim();
            
            // 1. จัดการระยะห่าง "ระหว่างหัวข้อไพ่" (ให้มีช่องว่าง 1 บรรทัดคั่นข้อ)
            let formattedExtra = cleanExtra.replace(/(?!^)\n*([-*])/g, '\n\n$1'); 
            
            // 2. จัดการระยะห่าง "หลังชื่อไพ่" (ให้ความหมายชิดชื่อไพ่ ไม่กระโดดเบิ้ล)
            formattedExtra = formattedExtra.replace(/:\s*\n*/g, ':\n'); 
            
            document.getElementById('extra-list').style.display = "block";
            document.getElementById('extra-list').innerHTML = `<span class="extra-title">⭐ ความหมายพิเศษ</span>${formattedExtra}`;
        }

        document.getElementById('btnSaveImg').style.display = 'inline-block';
        document.getElementById('btnSavePdf').style.display = 'inline-block';
        resDisp.scrollIntoView({ behavior: 'smooth' });
    }

    function saveAsImage() {
        const area = document.getElementById('capture-area');
        window.scrollTo(0,0);
        html2canvas(area, { useCORS: true, scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'ใบสรุปคำพยากรณ์-หมอวิทยา.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
